<svg width="600" height="100" viewBox="0 0 600 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes neonPulse {
      0%, 100% { filter: drop-shadow(0 0 5px #2ac7ff) drop-shadow(0 0 10px #2ac7ff); }
      50% { filter: drop-shadow(0 0 15px #2ac7ff) drop-shadow(0 0 25px #2ac7ff); }
    }
    .title-text {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 60px;
      letter-spacing: -2px;
      fill: #2ac7ff;
      animation: neonPulse 3s infinite ease-in-out;
    }
    .os-text {
      fill: #ffffff;
      opacity: 0.9;
    }
  </style>
  <text x="0" y="70" class="title-text">Income<tspan class="os-text">OS</tspan></text>
</svg>
