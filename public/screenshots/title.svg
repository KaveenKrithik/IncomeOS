<svg width="600" height="120" viewBox="0 0 600 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes letterAppear {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .letter {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800;
      font-size: 64px;
      fill: #ffffff;
      opacity: 0;
      animation: letterAppear 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    .accent {
      fill: #2ac7ff;
    }
  </style>
  <g text-anchor="middle">
    <text x="300" y="80">
      <tspan class="letter" style="animation-delay: 0.1s">I</tspan>
      <tspan class="letter" style="animation-delay: 0.15s">n</tspan>
      <tspan class="letter" style="animation-delay: 0.2s">c</tspan>
      <tspan class="letter" style="animation-delay: 0.25s">o</tspan>
      <tspan class="letter" style="animation-delay: 0.3s">m</tspan>
      <tspan class="letter" style="animation-delay: 0.35s">e</tspan>
      <tspan class="letter accent" style="animation-delay: 0.45s">O</tspan>
      <tspan class="letter accent" style="animation-delay: 0.5s">S</tspan>
    </text>
  </g>
  <rect x="220" y="95" width="160" height="1" fill="#2ac7ff" opacity="0.3">
    <animate attributeName="width" from="0" to="160" dur="1.5s" fill="freeze" />
    <animate attributeName="x" from="300" to="220" dur="1.5s" fill="freeze" />
  </rect>
</svg>
