<svg width="600" height="100" viewBox="0 0 600 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes sleekDraw {
      0% { stroke-dashoffset: 600; opacity: 0; }
      100% { stroke-dashoffset: 0; opacity: 1; }
    }
    .text-path {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      font-weight: 900;
      font-size: 72px;
      letter-spacing: -3px;
      fill: #ffffff;
      stroke: #ffffff;
      stroke-width: 0.5;
      stroke-dasharray: 600;
      animation: sleekDraw 2.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    .os-accent {
      fill: #2ac7ff;
      stroke: #2ac7ff;
    }
  </style>
  <text x="300" y="75" text-anchor="middle" class="text-path">Income<tspan class="os-accent">OS</tspan></text>
</svg>
