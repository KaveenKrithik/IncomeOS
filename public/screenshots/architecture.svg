<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes flowLine {
      0% { stroke-dashoffset: 100; opacity: 0.1; }
      50% { opacity: 0.8; }
      100% { stroke-dashoffset: 0; opacity: 0.1; }
    }
    .line {
      stroke: #2ac7ff;
      stroke-width: 2;
      stroke-dasharray: 10 90;
      animation: flowLine 3s infinite linear;
    }
    .node {
      fill: #0a0a0a;
      stroke: #2ac7ff;
      stroke-width: 1.5;
      filter: drop-shadow(0 0 5px rgba(42,199,255,0.4));
    }
    .node-text {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 14px;
      fill: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .sub-text {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 10px;
      fill: #ffffff;
      opacity: 0.4;
    }
  </style>
  
  <!-- Flow lines -->
  <path d="M 150 200 L 350 200" class="line" />
  <path d="M 450 200 L 650 200" class="line" />
  <path d="M 400 150 V 100 L 400 150" class="line" />
  <path d="M 400 250 V 300 L 400 250" class="line" />

  <!-- Nodes -->
  <rect x="50" y="160" width="100" height="80" rx="12" class="node" />
  <text x="100" y="200" text-anchor="middle" class="node-text">USER HUD</text>
  <text x="100" y="220" text-anchor="middle" class="sub-text">NEXT.JS 15</text>

  <rect x="350" y="160" width="100" height="80" rx="12" class="node" style="stroke: #8b5cf6;" />
  <text x="400" y="200" text-anchor="middle" class="node-text" style="fill: #8b5cf6;">INTELLIGENCE</text>
  <text x="400" y="220" text-anchor="middle" class="sub-text">AI ENGINE</text>

  <rect x="650" y="160" width="100" height="80" rx="12" class="node" />
  <text x="700" y="200" text-anchor="middle" class="node-text">STABILIZER</text>
  <text x="700" y="220" text-anchor="middle" class="sub-text">WALLET</text>

  <rect x="350" y="40" width="100" height="60" rx="10" class="node" style="stroke: #ffffff; opacity: 0.2;" />
  <text x="400" y="75" text-anchor="middle" class="node-text" style="font-size: 10px;">WEATHER API</text>

  <rect x="350" y="300" width="100" height="60" rx="10" class="node" style="stroke: #ffffff; opacity: 0.2;" />
  <text x="400" y="335" text-anchor="middle" class="node-text" style="font-size: 10px;">MAPS SYNC</text>
</svg>
